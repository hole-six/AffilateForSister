<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mất kết nối — iviback</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #ffffff;
      color: #0e0f0c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
      text-align: center;
      padding: 24px;
    }
    img { width: 72px; height: 72px; border-radius: 20px; }
    h1 { font-size: 20px; font-weight: 800; margin: 0; }
    p { font-size: 14px; color: #868685; margin: 0; max-width: 320px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      background: #e86a33;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <img src="/icon-192.png" alt="iviback" />
  <h1>Bạn đang mất kết nối mạng</h1>
  <p>Kiểm tra lại kết nối Internet rồi thử tải lại trang. Số dư và đơn hàng cần mạng để hiển thị chính xác.</p>
  <button onclick="location.reload()">Thử lại</button>
</body>
</html>
